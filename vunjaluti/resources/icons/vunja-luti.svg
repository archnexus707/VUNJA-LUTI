<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e14"/>
      <stop offset="1" stop-color="#12161f"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2a6d"/>
      <stop offset="0.5" stop-color="#d300c5"/>
      <stop offset="1" stop-color="#05d9e8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bg)" stroke="url(#neon)" stroke-width="3"/>
  <!-- onion rings -->
  <g fill="none" stroke="url(#neon)" filter="url(#glow)">
    <circle cx="64" cy="58" r="30" stroke-width="3" opacity="0.9"/>
    <circle cx="64" cy="58" r="20" stroke-width="2.5" opacity="0.7"/>
    <circle cx="64" cy="58" r="10" stroke-width="2" opacity="0.55"/>
  </g>
  <!-- rotation arrow -->
  <path d="M64 20 a38 38 0 1 1 -34 21" fill="none" stroke="#05d9e8" stroke-width="4"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M62 14 l8 6 -8 6 z" fill="#05d9e8" filter="url(#glow)"/>
  <!-- VL monogram -->
  <text x="64" y="112" text-anchor="middle" font-family="monospace" font-weight="700"
        font-size="20" fill="url(#neon)" filter="url(#glow)">VL</text>
</svg>
